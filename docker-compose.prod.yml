
services:
  backend:
    image: infantinoorg-backend:latest
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=["http://localhost:3000","https://infantino.org"]
      - ENABLE_GEMINI=${ENABLE_GEMINI:-false}
      - ENABLE_MAPS=${ENABLE_MAPS:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    networks:
      - infantino-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: infantinoorg-frontend:latest
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - infantino-network

networks:
  infantino-network:
    name: infantino-network
    driver: bridge
