[pytest]
asyncio_mode = auto
testpaths = ["tests"]
python_files = test_*.py
addopts = -v --ignore=tests/features/test_accessibility.py --ignore=tests/features/test_crowd.py --ignore=tests/features/test_navigation.py --ignore=tests/features/test_sustainability.py --ignore=tests/features/test_volunteer.py --ignore=tests/shared/test_middleware.py
pythonpath = .
